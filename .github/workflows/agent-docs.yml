name: Agent docs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-agent-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: td-meta

      - name: Check AGENTS.md is canonical
        run: td-meta/scripts/check-agent-docs.sh "$GITHUB_WORKSPACE"
