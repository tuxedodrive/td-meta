# ABOUTME: Reusable workflow for automating GitHub Project board status transitions.
# ABOUTME: Called by td-core, td-edge, td-training, td-tailor to move issues and PRs based on lifecycle.

name: Backlog Automation (Reusable)

on:
  workflow_call:
    inputs:
      project_number:
        description: 'GitHub Project number'
        required: false
        type: number
        default: 1
      org:
        description: 'GitHub organization'
        required: false
        type: string
        default: 'tuxedodrive'
    secrets:
      org_project_token:
        description: 'GitHub token with project:write scope'
        required: true

env:
  PROJECT_NUMBER: ${{ inputs.project_number }}
  ORG: ${{ inputs.org }}
  # Status field option IDs from the project
  STATUS_IN_PROGRESS: "67697bf8"
  STATUS_WAITING: "cf05b1f7"
  STATUS_DONE: "bb28dca0"

jobs:
  # Fetch project IDs once to avoid repeated lookups (single query per workflow run)
  cache-project-ids:
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.lookup.outputs.project_id }}
      status_field_id: ${{ steps.lookup.outputs.status_field_id }}
    steps:
      - name: Fetch project and status field IDs
        id: lookup
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.org_project_token }}
          script: |
            const query = `
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    field(name: "Status") {
                      ... on ProjectV2SingleSelectField {
                        id
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              org: '${{ env.ORG }}',
              number: ${{ env.PROJECT_NUMBER }}
            });

            const projectId = result.organization.projectV2.id;
            const statusFieldId = result.organization.projectV2.field.id;

            core.setOutput('project_id', projectId);
            core.setOutput('status_field_id', statusFieldId);
            console.log(`Cached project_id=${projectId}, status_field_id=${statusFieldId}`);

  # Move issue to "In Progress" when someone is assigned
  issue-assigned:
    needs: cache-project-ids
    if: github.event_name == 'issues' && github.event.action == 'assigned'
    runs-on: ubuntu-latest
    steps:
      - name: Move issue to In Progress
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.org_project_token }}
          script: |
            const issueNumber = context.payload.issue.number;
            const issueNodeId = context.payload.issue.node_id;
            console.log(`Issue #${issueNumber} was assigned`);

            // Find the project item for this issue
            const query = `
              query($nodeId: ID!) {
                node(id: $nodeId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project {
                          number
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              nodeId: issueNodeId
            });

            const projectItems = result.node?.projectItems?.nodes || [];
            const targetItem = projectItems.find(item => item.project.number === ${{ env.PROJECT_NUMBER }});

            if (!targetItem) {
              console.log(`Issue #${issueNumber} is not in the target project`);
              return;
            }

            // Update status to In Progress using cached IDs (skip status check to reduce queries)
            const mutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            await github.graphql(mutation, {
              projectId: '${{ needs.cache-project-ids.outputs.project_id }}',
              itemId: targetItem.id,
              fieldId: '${{ needs.cache-project-ids.outputs.status_field_id }}',
              optionId: '${{ env.STATUS_IN_PROGRESS }}'
            });

            console.log(`Moved issue #${issueNumber} to In Progress`);

  # Move linked issues based on PR lifecycle (draft, ready, merged)
  pr-linked-issues-status:
    needs: cache-project-ids
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]' &&
      (
        (github.event.action == 'opened' && github.event.pull_request.draft != true) ||
        github.event.action == 'ready_for_review' ||
        (github.event.action == 'closed' && github.event.pull_request.merged == true)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to appropriate status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.org_project_token }}
          script: |
            const pr = context.payload.pull_request;
            const action = context.payload.action;

            // Determine target status: merged → Done, otherwise → Waiting
            const isMerged = action === 'closed' && pr.merged;
            const targetStatus = isMerged ? '${{ env.STATUS_DONE }}' : '${{ env.STATUS_WAITING }}';
            const statusLabel = isMerged ? 'Done' : 'Waiting';

            console.log(`PR #${pr.number} ${action} → moving linked issues to ${statusLabel}`);

            // Find issues linked via closing keywords only (skip branch fallback to avoid expensive queries)
            const query = `
              query($nodeId: ID!) {
                node(id: $nodeId) {
                  ... on PullRequest {
                    closingIssuesReferences(first: 10) {
                      nodes {
                        number
                        id
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              nodeId: pr.node_id
            });

            const linkedIssues = result.node?.closingIssuesReferences?.nodes || [];

            if (linkedIssues.length === 0) {
              console.log('No linked issues found via closing references');
              return;
            }

            for (const issue of linkedIssues) {
              console.log(`Processing linked issue #${issue.number}`);

              const itemQuery = `
                query($nodeId: ID!) {
                  node(id: $nodeId) {
                    ... on Issue {
                      projectItems(first: 10) {
                        nodes {
                          id
                          project {
                            number
                          }
                        }
                      }
                    }
                  }
                }
              `;

              const itemResult = await github.graphql(itemQuery, {
                nodeId: issue.id
              });

              const projectItems = itemResult.node?.projectItems?.nodes || [];
              const targetItem = projectItems.find(item => item.project.number === ${{ env.PROJECT_NUMBER }});

              if (!targetItem) {
                console.log(`Issue #${issue.number} is not in the target project`);
                continue;
              }

              const mutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item {
                      id
                    }
                  }
                }
              `;

              await github.graphql(mutation, {
                projectId: '${{ needs.cache-project-ids.outputs.project_id }}',
                itemId: targetItem.id,
                fieldId: '${{ needs.cache-project-ids.outputs.status_field_id }}',
                optionId: targetStatus
              });

              console.log(`Moved issue #${issue.number} to ${statusLabel}`);
            }

  # Move PR itself to appropriate status column based on lifecycle events.
  # Draft PRs → In Progress, ready PRs → Waiting, merged PRs → Done.
  pr-item-status:
    needs: cache-project-ids
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event.action == 'opened' ||
        github.event.action == 'ready_for_review' ||
        github.event.action == 'converted_to_draft' ||
        (github.event.action == 'closed' && github.event.pull_request.merged == true)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Move PR to appropriate status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.org_project_token }}
          script: |
            const pr = context.payload.pull_request;
            const action = context.payload.action;

            // Determine target status based on PR lifecycle event
            let targetStatus, statusLabel;
            if (action === 'closed' && pr.merged) {
              targetStatus = '${{ env.STATUS_DONE }}';
              statusLabel = 'Done';
            } else if (action === 'ready_for_review' || (action === 'opened' && !pr.draft)) {
              targetStatus = '${{ env.STATUS_WAITING }}';
              statusLabel = 'Waiting';
            } else if (action === 'converted_to_draft' || (action === 'opened' && pr.draft)) {
              targetStatus = '${{ env.STATUS_IN_PROGRESS }}';
              statusLabel = 'In Progress';
            } else {
              console.log(`No status transition for action=${action} draft=${pr.draft}`);
              return;
            }

            console.log(`PR #${pr.number} → ${statusLabel} (action: ${action}, draft: ${pr.draft})`);

            // Find the project item for this PR
            const query = `
              query($nodeId: ID!) {
                node(id: $nodeId) {
                  ... on PullRequest {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project {
                          number
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              nodeId: pr.node_id
            });

            const projectItems = result.node?.projectItems?.nodes || [];
            const targetItem = projectItems.find(item => item.project.number === ${{ env.PROJECT_NUMBER }});

            if (!targetItem) {
              console.log(`PR #${pr.number} is not in the target project`);
              return;
            }

            const mutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            await github.graphql(mutation, {
              projectId: '${{ needs.cache-project-ids.outputs.project_id }}',
              itemId: targetItem.id,
              fieldId: '${{ needs.cache-project-ids.outputs.status_field_id }}',
              optionId: targetStatus
            });

            console.log(`Moved PR #${pr.number} to ${statusLabel}`);
