# ABOUTME: @claude mention agent for td-core with Ruby/Postgres test environment.
# ABOUTME: Deploy to td-core as .github/workflows/claude.yml.

name: Claude Code

on:
  issue_comment: { types: [created] }
  pull_request_review_comment: { types: [created] }
  pull_request_review: { types: [submitted] }
  issues: { types: [opened, assigned] }

jobs:
  claude:
    # Ignore bot comments to prevent loops.
    if: >
      (github.actor != 'github-actions[bot]') &&
      (
        github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, '@claude') ||
        github.event_name == 'pull_request_review_comment' &&
          contains(github.event.comment.body, '@claude') ||
        github.event_name == 'pull_request_review' &&
          contains(github.event.review.body, '@claude') ||
        github.event_name == 'issues' &&
          (contains(github.event.issue.body, '@claude') ||
           contains(github.event.issue.title, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    concurrency:
      group: claude-${{ github.repository }}-${{ github.event.issue.number || github.run_id }}
      cancel-in-progress: false

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: td_core_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/td_core_test
      TZ: "UTC"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up test database
        run: bin/rails db:create db:schema:load

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: >-
            If invoked by schedule, continue previously assigned work;
            if blocked, post one concise question and propose two options.
            CRITICAL: You have a test environment (Ruby, Postgres, schema loaded).
            Run `bin/rails test` before every push — this works immediately.
            For integration tests, first run: `bin/rails db:seed`, then
            `INTEGRATION_TESTS=1 bin/rails test test/integration`.
            For cucumber, first run: `bun install && bunx tailwindcss
            --config config/tailwind.config.js
            -i ./app/assets/stylesheets/application.tailwind.css
            -o ./app/assets/builds/tailwind.css --minify && bin/rails db:seed`,
            then `bundle exec cucumber --tags "not @wip and not @needs_infrastructure and not @javascript"`.
            Create PRs as drafts (gh pr create --draft). Only mark ready for
            review (gh pr ready) after all tests pass green.
          claude_args: |
            --max-turns 12
