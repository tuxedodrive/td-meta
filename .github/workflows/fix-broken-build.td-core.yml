# ABOUTME: Self-healing CI for td-core that analyzes failures on main and attempts fixes.
# ABOUTME: Deploy to td-core as .github/workflows/fix-broken-build.yml.

name: Fix Broken Build

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  fix-if-failed:
    # Only run if CI failed on main (not PRs — let authors fix their own)
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 10

      - name: Fetch failure logs
        id: fetch-logs
        run: |
          gh run view ${{ github.event.workflow_run.id }} --log-failed > /tmp/ci-failure.log 2>&1 || true
          echo "logs_file=/tmp/ci-failure.log" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check if fix already attempted
        id: check-existing
        run: |
          RECENT_FIX=$(git branch -r --format='%(refname:short) %(creatordate:unix)' | \
            grep 'origin/fix/ci-auto-' | \
            awk -v cutoff="$(date -d '1 hour ago' +%s 2>/dev/null || date -v-1H +%s)" \
              '$2 > cutoff {print $1}' | head -1)
          if [ -n "$RECENT_FIX" ]; then
            echo "existing_fix=true" >> $GITHUB_OUTPUT
            echo "Recent fix branch exists: $RECENT_FIX - skipping to avoid loops"
          else
            echo "existing_fix=false" >> $GITHUB_OUTPUT
          fi

      - name: Attempt automated fix
        if: steps.check-existing.outputs.existing_fix == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.SELF_HEALING_CI_GITHUB_ACTIONS }}
          prompt: |
            The CI build on main just failed. Your job is to fix it.

            Failed workflow run: ${{ github.event.workflow_run.html_url }}
            Run ID: ${{ github.event.workflow_run.id }}
            Commit that broke it: ${{ github.event.workflow_run.head_sha }}

            IMPORTANT: The CI failure logs have been saved to /tmp/ci-failure.log - read this file first!

            Steps:
            1. Read /tmp/ci-failure.log to see the actual failure
            2. Analyze the error output carefully
            3. Categorize the failure:
               - PLUMBING: CSS freshness, import errors, typos, missing dependencies, test setup issues
               - SEMANTIC: Intentional behavior changes, test expectation mismatches

            If PLUMBING (e.g., CSS freshness):
            - Fix the issue (for CSS: run `bin/rails tailwindcss:build`)
            - Stage and commit with: "fix(ci): [description of fix]"
            - The fix will be pushed automatically

            If SEMANTIC:
            - Do NOT attempt to fix
            - Create a GitHub issue using `gh issue create` explaining:
              - What failed
              - Why it appears to be an intentional change needing human review
              - Add labels: ci-failure, needs-review

            Important:
            - Only fix obvious mechanical issues
            - Never change test expectations without understanding why
            - If unsure, create an issue instead of guessing
            - Use `gh` CLI for GitHub operations (it's already authenticated)
          claude_args: |
            --max-turns 15
            --allowedTools Bash,Read,Write,Edit,Glob,Grep

      - name: Push fix if changes were made
        if: steps.check-existing.outputs.existing_fix == 'false'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH_NAME="fix/ci-auto-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH_NAME"
            git push -u origin "$BRANCH_NAME"
            gh pr create \
              --title "fix(ci): Automated fix for broken build" \
              --body "This PR was automatically generated to fix a CI failure on main.

              Failed run: ${{ github.event.workflow_run.html_url }}

              Please review before merging." \
              --base main
          fi
        env:
          GH_TOKEN: ${{ github.token }}
